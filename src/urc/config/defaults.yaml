# Defaults empaquetados con urc. Cada proyecto/experimento solo necesita
# describir lo que quiere cambiar respecto a esto (ver ROADMAP.md, sección 5).
bridge: mlagents
bridge_options: {}
algo: sb3-ppo
env: null
# learning_rate y gamma coinciden con los defaults propios de Stable-Baselines3
# PPO: se listan explícitamente para que se vean con `urc config show`, no
# porque haga falta forzarlos. batch_size y demás se dejan a los defaults de
# SB3 en vez de reinventarlos aquí.
hyperparameters:
  learning_rate: 3.0e-4
  gamma: 0.99
training:
  max_steps: 500000
  checkpoint_every: 50000
  progress_bar: false
logging:
  backend: tensorboard
  project: urc
recording:
  enabled: false
  fast_forward_speed: 20.0
  normal_speed_every_n_steps: 500
  normal_time_scale: 0.25
  stabilization_window: 5
  min_episodes_between_breakthroughs: 20
  max_breakthroughs: 5
  final_episodes: 4
  final_time_scale: 0.05
  fps: 10
  keep_frames: false
output_dir: runs
