name: Unity integration

# Prueba MLAgentsBridge contra un build headless real de Unity (escena Basic
# de ML-Agents), descargado de un Release de este repo en vez de compilarse
# dentro de CI — ver ROADMAP.md, Fase 11, para el porqué de este enfoque
# (evita vendorizar ml-agents y necesitar una licencia de Unity en CI).

on:
  # Solo manual por ahora: en cuanto esto corra bien un par de veces seguidas,
  # cambia esto a "push:"/"pull_request:" como en ci.yml.
  workflow_dispatch:

env:
  # Cambia esto si subes el build a otro tag/nombre de asset.
  UNITY_BUILD_RELEASE_TAG: unity-basic-linux-v1
  UNITY_BUILD_ASSET_NAME: basic-linux-headless.zip

jobs:
  unity-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev + mlagents)
        run: pip install -e ".[dev,mlagents]"

      - name: Download headless Unity build from GitHub Release
        run: |
          curl -fL -o build.zip \
            "https://github.com/${{ github.repository }}/releases/download/${{ env.UNITY_BUILD_RELEASE_TAG }}/${{ env.UNITY_BUILD_ASSET_NAME }}"
          mkdir -p unity_build
          unzip -q build.zip -d unity_build
          echo "--- Contenido extraído (hasta 3 niveles) ---"
          find unity_build -maxdepth 3
          # El build se exportó en Windows: el bit de ejecución no sobrevive al
          # zip, hay que ponerlo a mano. Sin límite de profundidad, por si el
          # zip mete todo dentro de una carpeta contenedora.
          find unity_build -type f -name "*.x86_64" -exec chmod +x {} \;

      - name: Set up virtual display (Xvfb)
        run: |
          # El player de Unity en Linux, incluso en modo -batchmode/-nographics,
          # puede necesitar conectar a un servidor X real para inicializarse sin
          # crashear (SIGSEGV) en runners sin GPU/X real como ubuntu-latest.
          # Xvfb da un display virtual que basta para eso.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Run pytest against the real build
        run: |
          BUILD_PATH=$(find unity_build -type f -name "*.x86_64" | head -n1)
          echo "Usando build: $BUILD_PATH"
          if [ -z "$BUILD_PATH" ]; then
            echo "::error::No se encontró ningún .x86_64 dentro de unity_build/ — revisa la estructura del zip subido al Release."
            exit 1
          fi
          URC_UNITY_BUILD_PATH="$BUILD_PATH" pytest tests/test_unity_headless_integration.py -v
