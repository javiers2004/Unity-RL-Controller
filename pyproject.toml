[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "urc"
version = "0.1.0"
description = "Unity RL Controller — controla entrenamientos de Reinforcement Learning en Unity desde la terminal."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.12",
]

[project.scripts]
urc = "urc.cli.main:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
    "pre-commit>=3.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/urc"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
